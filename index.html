<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>域名更新通知</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#3b82f6',
                        accent: '#60a5fa',
                        neutral: '#64748b',
                        dark: '#0f172a',
                        success: '#10b981',
                        danger: '#ef4444',
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 10px 25px -5px rgba(37, 99, 235, 0.1), 0 8px 10px -6px rgba(37, 99, 235, 0.05)',
                        'card-hover': '0 20px 25px -5px rgba(37, 99, 235, 0.15), 0 8px 10px -6px rgba(37, 99, 235, 0.1)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .text-shadow {
                text-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }
            .bg-gradient-primary {
                background: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
            }
            .bg-glass {
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
            }
            .scale-hover {
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
            .scale-hover:hover {
                transform: translateY(-4px) scale(1.01);
            }
        }
    </style>
</head>
<body class="font-inter bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen flex flex-col">
    <!-- 装饰背景元素 -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-0 right-0 w-96 h-96 bg-primary/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-secondary/5 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2"></div>
    </div>

    <!-- 顶部通知条 - 带动效 -->
    <div class="bg-glass text-primary border-b border-primary/10 text-center py-3 px-4 shadow-sm animate-fadeIn">
        <p class="text-sm md:text-base flex items-center justify-center gap-2">
            <i class="fa fa-bell animate-pulse"></i>
            <span class="font-medium">重要通知：本网站域名已更新，请尽快更新书签</span>
        </p>
    </div>

    <!-- 主内容区 -->
    <main class="flex-grow flex items-center justify-center px-4 py-12 md:py-20">
        <div class="max-w-2xl w-full bg-white rounded-3xl shadow-card hover:shadow-card-hover overflow-hidden scale-hover">
            <!-- 顶部渐变条 -->
            <div class="bg-gradient-primary h-3"></div>
            
            <div class="p-6 md:p-10">
                <!-- 图标和标题 - 更有层次感 -->
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-blue-50 mb-6 relative">
                        <div class="absolute inset-0 bg-gradient-primary rounded-full opacity-10 animate-pulse"></div>
                        <i class="fa fa-link text-primary text-5xl relative z-10"></i>
                    </div>
                    <h1 class="text-[clamp(2rem,6vw,3rem)] font-bold text-dark mb-4 text-shadow tracking-tight">域名已更新</h1>
                    <p class="text-neutral text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">
                        我们已更换至全新的官方域名，为您提供更稳定、更优质的服务体验
                    </p>
                </div>
                
                <!-- 域名信息 - 优化布局和视觉 -->
                <div class="bg-gray-50 rounded-2xl p-8 mb-10 shadow-sm hover:shadow-md transition-all duration-300">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <!-- 旧域名 -->
                        <div class="bg-white p-5 rounded-xl border border-red-100">
                            <div class="flex items-center mb-2">
                                <span class="text-danger text-sm font-medium mr-2">
                                    <i class="fa fa-times-circle"></i> 已停用
                                </span>
                            </div>
                            <p class="text-neutral text-sm mb-2">旧域名</p>
                            <div class="font-mono bg-red-50 px-4 py-3 rounded-lg text-gray-500 text-sm md:text-base line-through">
                                https://pan.iqkx.cn
                            </div>
                        </div>
                        
                        <!-- 新域名 -->
                        <div class="bg-white p-5 rounded-xl border border-green-100">
                            <div class="flex items-center mb-2">
                                <span class="text-success text-sm font-medium mr-2">
                                    <i class="fa fa-check-circle"></i> 推荐使用
                                </span>
                            </div>
                            <p class="text-neutral text-sm mb-2">新域名</p>
                            <div class="font-mono bg-green-50 px-4 py-3 rounded-lg text-primary font-medium text-sm md:text-base">
                                https://pan.puaaa.cn
                            </div>
                        </div>
                    </div>
                    
                    <!-- 倒计时 - 优化进度条样式 -->
                    <div class="border-t border-gray-100 pt-6">
                        <p class="text-neutral text-center mb-4">
                            页面将在 <span id="countdown" class="font-bold text-primary text-xl">10</span> 秒后自动跳转
                        </p>
                        <div class="w-full bg-gray-100 rounded-full h-3 overflow-hidden">
                            <div id="progress-bar" class="bg-gradient-primary h-full rounded-full transition-all duration-1000 ease-linear" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 操作按钮 - 优化样式和交互 -->
                <div class="flex flex-col sm:flex-row gap-4 justify-center mb-10">
                    <a href="https://pan.puaaa.cn" class="bg-gradient-primary text-white font-medium py-4 px-10 rounded-xl transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-1 flex items-center justify-center gap-2 text-lg">
                        <i class="fa fa-arrow-right"></i>
                        <span>立即跳转至新域名</span>
                    </a>
                    <button id="copyBtn" class="bg-white hover:bg-gray-50 text-primary border border-primary/20 font-medium py-4 px-10 rounded-xl transition-all duration-300 shadow hover:shadow-md flex items-center justify-center gap-2 text-lg">
                        <i class="fa fa-copy"></i>
                        <span>复制新域名</span>
                    </button>
                </div>
                
                <!-- 说明信息 - 优化排版 -->
                <div class="text-center text-neutral text-sm pt-4 border-t border-gray-100">
                    <p class="mb-3 flex items-center justify-center gap-2">
                        <i class="fa fa-info-circle text-primary"></i>
                        <span>如有任何疑问，请联系我们！</span>
                    </p>
                    <p class="text-primary font-medium flex items-center justify-center gap-2">
                        <i class="fa fa-weixin text-2xl"></i>
                        <span>微信：nbioss</span>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部版权信息 -->
    <footer class="py-6 text-center text-neutral/70 text-sm">
        <p>© 2025 版权所有 | 感谢您的理解与支持</p>
    </footer>

    <script>
        // 页面加载动画
        document.addEventListener('DOMContentLoaded', function() {
            // 淡入动画
            document.querySelectorAll('body > *').forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                
                setTimeout(() => {
                    el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 + (index * 200));
            });

            // 倒计时和进度条逻辑
            const countdownEl = document.getElementById('countdown');
            const progressBar = document.getElementById('progress-bar');
            const copyBtn = document.getElementById('copyBtn');
            const newDomain = 'https://pan.puaaa.cn';
            let countdown = 10;
            
            const interval = setInterval(function() {
                countdown--;
                countdownEl.textContent = countdown;
                progressBar.style.width = `${countdown * 10}%`;
                
                if (countdown <= 0) {
                    clearInterval(interval);
                    window.location.href = newDomain;
                }
            }, 1000);
            
            // 复制新域名功能 - 优化交互反馈
            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(newDomain)
                    .then(() => {
                        // 保存原始状态
                        const originalIcon = this.querySelector('i').className;
                        const originalText = this.querySelector('span').textContent;
                        const originalClasses = this.className;
                        
                        // 更新按钮状态
                        this.className = 'bg-green-50 text-success border border-success/20 font-medium py-4 px-10 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 text-lg';
                        this.querySelector('i').className = 'fa fa-check';
                        this.querySelector('span').textContent = '已复制！';
                        
                        // 添加成功动画
                        this.classList.add('animate-pulse');
                        
                        // 恢复原始状态
                        setTimeout(() => {
                            this.className = originalClasses;
                            this.querySelector('i').className = originalIcon;
                            this.querySelector('span').textContent = originalText;
                            this.classList.remove('animate-pulse');
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('复制失败: ', err);
                        alert('复制失败，请手动复制域名：' + newDomain);
                    });
            });
        });
    </script>
</body>
</html>
